[alembic]
script_location = sinc/db/migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url é sobrescrito programaticamente em env.py via DATABASE_SYNC_URL
sqlalchemy.url = postgresql+psycopg2://sinc:sinc@localhost:5432/sinc

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
